<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bunker: Belarusian Roots</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(145deg, #2a5e2a 0%, #1a3a1a 100%); min-height: 100vh; margin: 0; padding: 20px; color: #fef7e0; }
        .container { max-width: 1200px; margin: 0 auto; background: #2c2e24cc; backdrop-filter: blur(10px); border-radius: 48px; padding: 20px; border: 1px solid #e2bc7c; }
        h1 { text-align: center; font-size: 2rem; }
        .sub { text-align: center; margin-bottom: 25px; font-style: italic; color: #ecd88f; }
        .mode-selector { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .mode-btn { background: #4a6e3a; color: white; padding: 12px 30px; border-radius: 60px; border: none; font-weight: bold; cursor: pointer; }
        .mode-btn.active { background: #efbc6e; color: #2d2b1f; }
        .lobby-panel, .join-panel, .game-panel, .chat-panel { background: #1f2a1ccc; border-radius: 32px; padding: 20px; margin-bottom: 20px; }
        .timer-panel { background: #000000aa; border-radius: 60px; text-align: center; padding: 12px; margin-bottom: 20px; font-size: 2rem; font-weight: bold; font-family: monospace; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, button { padding: 10px 16px; border-radius: 60px; border: none; font-size: 1rem; margin: 5px; } 
        input { background: #fffcf0; width: 200px; }
        button { background: #efbc6e; font-weight: bold; cursor: pointer; }
        .danger-btn { background: #c26144; color: white; }
        .player-list { background: #00000055; border-radius: 28px; padding: 12px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .player-name { background: #e9dba9; color: #2c4820; display: inline-block; margin: 5px; padding: 5px 12px; border-radius: 40px; font-weight: bold; }
        .card-view { background: #fffdf5; color: #2e3822; border-radius: 32px; padding: 20px; border-left: 14px solid #cb9e4a; margin-top: 20px; }
        .hidden-card { filter: blur(8px); background: #5f7350; text-align: center; padding: 35px; cursor: pointer; }
        .badge { background: #ebc47f; display: inline-block; padding: 2px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; margin-right: 8px; }
        .flex-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .chat-messages { background: #00000066; border-radius: 20px; height: 300px; overflow-y: auto; padding: 15px; margin-bottom: 15px; font-size: 0.85rem; }
        .chat-message { margin-bottom: 8px; border-bottom: 1px solid #e2bc7c55; padding-bottom: 5px; }
        .chat-input-area { display: flex; gap: 10px; }
        .voting-area { background: #2a3a1ecc; border-radius: 28px; padding: 15px; margin-top: 15px; }
        .status { background: #00000066; border-radius: 40px; padding: 4px 15px; display: inline-block; }
        @media (max-width: 800px) { .two-columns { grid-template-columns: 1fr; } .timer-panel { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🥔 BUNKER: BELARUSIAN ROOTS 🥔</h1>
    <div class="sub">Potato apocalypse | Only Belarusian roots (or convincing lies) save you</div>

    <div class="mode-selector">
        <button id="soloModeBtn" class="mode-btn active">🤖 Solo vs 5 Bots</button>
        <button id="multiplayerModeBtn" class="mode-btn">👥 Multiplayer (2-6 players)</button>
    </div>

    <div id="soloPanel">
        <div class="lobby-panel">
            <h3>🎮 SOLO MODE: You + 5 Bots</h3>
            <p>You'll play against 5 AI opponents. Each bot has a unique character card.</p>
            <button id="startSoloGameBtn">▶ Start Solo Game (10 minutes)</button>
        </div>
    </div>

    <div id="multiplayerPanel" style="display:none;">
        <div class="lobby-panel">
            <h3>🎮 GAME MASTER</h3>
            <label>Number of players (2-6): </label>
            <input type="number" id="playerCountInput" min="2" max="6" value="4">
            <button id="createGameBtn">✨ Create lobby & get room number</button>
            <div id="gmCodeDisplay" style="margin-top: 12px;"></div>
        </div>
        <div class="join-panel">
            <h3>🔗 JOIN AS PLAYER</h3>
            <input type="text" id="joinCodeInput" placeholder="Room number">
            <input type="text" id="playerNameInput" placeholder="Your name">
            <button id="joinGameBtn">🚪 Join room</button>
            <div id="joinMessage" class="error"></div>
        </div>
    </div>

    <div id="gameActivePanel" style="display:none;">
        <div class="timer-panel" id="timerDisplay">⏱️ 10:00</div>
        <div class="two-columns">
            <div class="game-panel">
                <h3>🎴 YOUR SECRET IDENTITY</h3>
                <div id="playerCardContainer"></div>
                <div class="flex-btns">
                    <button id="revealOwnCardBtn">👁️ Reveal / Hide my card</button>
                    <button id="copyCardInfoBtn">📋 Copy my card info</button>
                </div>
            </div>
            <div class="chat-panel">
                <h3>💬 GAME CHAT</h3>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type your message...">
                    <button id="sendChatBtn">Send</button>
                </div>
                <div id="votingArea" class="voting-area" style="display:none;">
                    <h4>🗳️ FINAL VOTE</h4>
                    <div id="voteButtons"></div>
                    <button id="submitVoteBtn" class="danger-btn">Submit My Vote</button>
                </div>
            </div>
        </div>
        <div class="flex-btns">
            <button id="nextPhaseBtn">⏩ Next Phase</button>
            <button id="exitGameBtn" class="danger-btn">Exit Game</button>
        </div>
    </div>
</div>

<script>
    const FULL_DECK = [
        { category: "NATIVE BELARUSIAN", name: "Aliaksandr, tractor driver", roots: "Born in Ozertso village near Minsk.", skill: "Fixes any tractor with nails & wire.", phrase: "Draniki without sour cream? That's an insult!" },
        { category: "NATIVE BELARUSIAN", name: "Hanna, beekeeper", roots: "Grandfather was a forester for Count Czapski.", skill: "Healing honey + knows mushroom spots.", phrase: "If there's honey, there will be life." },
        { category: "NATIVE BELARUSIAN", name: "Volha, shop assistant", roots: "Grandma traded at Komarowski Market since 1975.", skill: "Can get any scarce item.", phrase: "No queue? Only if you're a true Belarusian." },
        { category: "NATIVE BELARUSIAN", name: "Mikhas, potato breeder", roots: "Created 'Krynitsa-2020' potato.", skill: "Grows potatoes on concrete.", phrase: "Potato is our mother!" },
        { category: "NATIVE BELARUSIAN", name: "Vera, librarian", roots: "Great-grandfather friends with Yanka Kupala.", skill: "Recites classic poems.", phrase: "Read Kupala? True Belarusian!" },
        { category: "HOLLYWOOD (REAL)", name: "Harrison Ford", roots: "Grandparents from MINSK.", skill: "Flies planes, uses a whip.", phrase: "I found the Crystal Skull near Minsk!" },
        { category: "HOLLYWOOD (REAL)", name: "Scarlett Johansson", roots: "Great-grandfather from NESVIZH.", skill: "Spy skills, steals food.", phrase: "I'm a Belarusian Black Widow!" },
        { category: "HOLLYWOOD (REAL)", name: "Kirk Douglas", roots: "Born in CHAUSY, Mogilev region.", skill: "Spartacus charisma.", phrase: "I am Spartacus from near Mogilev!" },
        { category: "HOLLYWOOD (REAL)", name: "Ralph Lauren", roots: "Father from PINSK, mother from GRODNO.", skill: "Sews clothes from scraps.", phrase: "Polo means field!" },
        { category: "HOLLYWOOD (REAL)", name: "Lisa Kudrow", roots: "Ancestors from ILYA village.", skill: "Sings, reads potato peels.", phrase: "My grandma taught me to survive." },
        { category: "IMPOSTOR", name: "Tom Cruise", roots: "NO Belarusian roots!", skill: "Runs up walls.", phrase: "I parachuted over Minsk! In a simulator." },
        { category: "IMPOSTOR", name: "Angelina Jolie", roots: "NO Belarusian roots!", skill: "Adopts things.", phrase: "I adopted a Belarusian potato!" },
        { category: "IMPOSTOR", name: "Leonardo DiCaprio", roots: "NO Belarusian roots!", skill: "Fake accent.", phrase: "I filmed The Revenant in Belarus? Wait..." },
        { category: "COMIC", name: "Dzmitry, TikTok blogger", roots: "Thinks he's Belarusian.", skill: "Makes viral videos.", phrase: "Subscribe to my TikTok!" },
        { category: "COMIC", name: "Talking potato", roots: "It IS a potato.", skill: "Can be eaten.", phrase: "Don't eat me!" }
    ];

    let currentGame = { mode: "solo", gameStarted: false, players: [], timeLeft: 600, timerInterval: null, gamePhase: "identity", votes: {}, crisisIndex: 0 };
    const CRISES = ["Salt for lard ran out!", "Rodent eating potatoes!", "Fermented cabbage stolen!", "Radiation leak!", "Water filter broke!"];

    function escapeHtml(s) { return s.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function addChatMessage(sender, msg) { const d = document.createElement("div"); d.className = "chat-message"; d.innerHTML = `<strong>${escapeHtml(sender)}:</strong> ${escapeHtml(msg)}`; document.getElementById("chatMessages").appendChild(d); d.scrollIntoView(); }
    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function updateTimerDisplay() { document.getElementById("timerDisplay").innerHTML = `⏱️ ${formatTime(currentGame.timeLeft)}`; }
    
    function startTimer() { if(currentGame.timerInterval) clearInterval(currentGame.timerInterval); currentGame.timerInterval = setInterval(() => { if(currentGame.timeLeft<=1) { clearInterval(currentGame.timerInterval); addChatMessage("SYSTEM","Time's up!"); nextPhase(); } else { currentGame.timeLeft--; updateTimerDisplay(); } }, 1000); }
    
    function botIntro(b) { addChatMessage(b.name, `I am ${b.cardData.name}. Roots: ${b.cardData.roots.substring(0,80)}. Skill: ${b.cardData.skill}. ${b.cardData.phrase}`); }
    function botCrisis(b,c) { addChatMessage(b.name, `As ${b.cardData.name}, I use ${b.cardData.skill.toLowerCase()}. ${b.cardData.phrase.substring(0,60)}`); }
    
    function startSoloGame() {
        let shuffled = [...FULL_DECK];
        for(let i=shuffled.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        let players = [{ name: "You", isBot: false, cardData: shuffled[0], votedFor: null }];
        let botNames = ["Olga", "Dennis", "Svetlana", "Vlad", "Maria"];
        for(let i=0;i<5;i++) players.push({ name: botNames[i], isBot: true, cardData: shuffled[i+1], votedFor: null });
        for(let i=players.length-1;i>0;i--) { let j=Math.floor(Math.random()*(i+1)); [players[i],players[j]]=[players[j],players[i]]; }
        currentGame = { mode:"solo", gameStarted:true, players:players, currentPlayerCard:shuffled[0], timeLeft:600, timerInterval:null, gamePhase:"identity", votes:{}, crisisIndex:Math.floor(Math.random()*CRISES.length) };
        document.getElementById("playerCardContainer").innerHTML = `<div class="card-view" id="playerCardDiv"><div class="badge">${escapeHtml(shuffled[0].category)}</div><h2>${escapeHtml(shuffled[0].name)}</h2><div><span class="badge">🥔 ROOTS</span> ${escapeHtml(shuffled[0].roots)}</div><div><span class="badge">🛠️ SKILL</span> ${escapeHtml(shuffled[0].skill)}</div><div><span class="badge">🗣️ PHRASE</span> "${escapeHtml(shuffled[0].phrase)}"</div></div>`;
        document.getElementById("chatMessages").innerHTML = '<div class="chat-message">Game started! Round 1: Identity check...</div>';
        setTimeout(() => { addChatMessage("SYSTEM","ROUND 1: Introduce yourself!"); let d=3000; currentGame.players.forEach(p=>{ if(p.isBot){ setTimeout(()=>botIntro(p),d); d+=4000; } }); },500);
        startTimer(); updateTimerDisplay();
        document.getElementById("soloPanel").style.display="none"; document.getElementById("multiplayerPanel").style.display="none"; document.getElementById("gameActivePanel").style.display="block";
        document.getElementById("votingArea").style.display="none";
    }
    
    function nextPhase() {
        if(!currentGame.gameStarted) return;
        if(currentGame.gamePhase==="identity") {
            currentGame.gamePhase="crisis";
            let crisis=CRISES[currentGame.crisisIndex];
            addChatMessage("SYSTEM",`🔥 CRISIS: ${crisis}`);
            let d=2000;
            currentGame.players.forEach(p=>{ if(p.isBot){ setTimeout(()=>botCrisis(p,crisis),d); d+=4000; } });
            setTimeout(()=>{ addChatMessage("SYSTEM","Time to vote!"); startVoting(); }, d+2000);
        } else if(currentGame.gamePhase==="crisis") { startVoting(); }
        else if(currentGame.gamePhase==="voting") { endGame(); }
    }
    
    function startVoting() {
        currentGame.gamePhase="voting";
        let div=document.getElementById("voteButtons");
        div.innerHTML="";
        currentGame.players.forEach(p=>{ let btn=document.createElement("button"); btn.innerText=p.name; btn.onclick=()=>{ document.querySelectorAll("#voteButtons button").forEach(b=>b.style.background="#efbc6e"); btn.style.background="#6f9e3f"; currentGame.votes.humanVote=p.name; }; div.appendChild(btn); });
        document.getElementById("votingArea").style.display="block";
        addChatMessage("SYSTEM","Vote for the LEAST convincing player!");
        setTimeout(()=>{ if(currentGame.gamePhase==="voting"){ currentGame.players.filter(p=>p.isBot).forEach(b=>{ let others=currentGame.players.filter(o=>o.name!==b.name); let vote=others[Math.floor(Math.random()*others.length)].name; currentGame.votes[b.name]=vote; addChatMessage(b.name,`I vote for ${vote}.`); }); } },15000);
    }
    
    function endGame() {
        if(!currentGame.votes.humanVote) { addChatMessage("SYSTEM","You didn't vote! Vote now."); return; }
        addChatMessage("You",`I vote for ${currentGame.votes.humanVote}`);
        let counts={};
        for(let [v,t] of Object.entries(currentGame.votes)) if(t) counts[t]=(counts[t]||0)+1;
        let eliminated=null, maxV=-1;
        for(let [p,c] of Object.entries(counts)) if(c>maxV){ maxV=c; eliminated=p; }
        if(eliminated) addChatMessage("SYSTEM",`${eliminated} is eliminated!`);
        document.getElementById("votingArea").style.display="none";
        if(currentGame.timerInterval) clearInterval(currentGame.timerInterval);
    }
    
    document.getElementById("soloModeBtn").onclick=()=>{ document.getElementById("soloModeBtn").classList.add("active"); document.getElementById("multiplayerModeBtn").classList.remove("active"); document.getElementById("soloPanel").style.display="block"; document.getElementById("multiplayerPanel").style.display="none"; };
    document.getElementById("multiplayerModeBtn").onclick=()=>{ document.getElementById("multiplayerModeBtn").classList.add("active"); document.getElementById("soloModeBtn").classList.remove("active"); document.getElementById("soloPanel").style.display="none"; document.getElementById("multiplayerPanel").style.display="block"; alert("Multiplayer: Host mode works when game is online. Share the link with friends!"); };
    document.getElementById("startSoloGameBtn").onclick=startSoloGame;
    document.getElementById("nextPhaseBtn").onclick=nextPhase;
    document.getElementById("exitGameBtn").onclick=()=>{ if(confirm("Exit?")) location.reload(); };
    document.getElementById("sendChatBtn").onclick=()=>{ let inp=document.getElementById("chatInput"); let msg=inp.value.trim(); if(msg && currentGame.gameStarted){ addChatMessage("You",msg); inp.value=""; } };
    document.getElementById("chatInput").onkeypress=(e)=>{ if(e.key==="Enter") document.getElementById("sendChatBtn").click(); };
    document.getElementById("submitVoteBtn").onclick=endGame;
    document.getElementById("revealOwnCardBtn").onclick=()=>{ let d=document.getElementById("playerCardDiv"); if(d) d.classList.toggle("hidden-card"); };
    document.getElementById("copyCardInfoBtn").onclick=()=>{ let d=document.getElementById("playerCardDiv"); if(d){ navigator.clipboard.writeText(d.innerText); alert("Copied!"); } };
    document.getElementById("createGameBtn").onclick=()=>alert("Multiplayer: Share this link with friends! They open same link.");
    document.getElementById("joinGameBtn").onclick=()=>alert("Just open the same link in another browser tab!");
</script>
</body>
</html>
