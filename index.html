<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bunker: Belarusian Roots</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #2a5e2a; color: white; padding: 20px; }
        button { background: #efbc6e; padding: 10px 20px; font-size: 18px; margin: 10px; border-radius: 30px; border: none; cursor: pointer; }
        .card { background: white; color: black; padding: 20px; border-radius: 20px; margin: 20px auto; max-width: 500px; text-align: left; }
        .hidden-card { filter: blur(5px); }
        .chat { background: #00000066; height: 200px; overflow-y: auto; padding: 10px; border-radius: 10px; margin: 10px auto; max-width: 600px; text-align: left; }
        input { padding: 10px; border-radius: 30px; border: none; width: 250px; }
        .mode-btn { background: #4a6e3a; color: white; }
        .active { background: #efbc6e; color: black; }
    </style>
</head>
<body>
    <h1>🥔 BUNKER: BELARUSIAN ROOTS 🥔</h1>
    <p>Global potato apocalypse | Only Belarusian roots save you</p>

    <button id="soloBtn" class="mode-btn active">🤖 Solo vs Bots</button>
    <button id="multiBtn" class="mode-btn">👥 Multiplayer</button>

    <div id="soloPanel">
        <button id="startGame">▶ Start Solo Game (10 min)</button>
    </div>

    <div id="multiPanel" style="display:none;">
        <p>Multiplayer: Share this link with friends! Everyone opens same link.</p>
        <button id="createLobby">Create Lobby</button>
        <input type="text" id="joinCode" placeholder="Room number">
        <button id="joinLobby">Join</button>
    </div>

    <div id="gamePanel" style="display:none;">
        <h2 id="timer">⏱️ 10:00</h2>
        <div id="cardArea"></div>
        <div class="chat" id="chat"></div>
        <input type="text" id="chatInput" placeholder="Type message...">
        <button id="sendChat">Send</button>
        <div id="voteArea" style="display:none;">
            <h3>VOTE - Who should be eliminated?</h3>
            <div id="voteBtns"></div>
            <button id="submitVote">Submit Vote</button>
        </div>
        <br>
        <button id="nextPhase">▶ Next Phase</button>
        <button id="exitGame">Exit</button>
    </div>

    <script>
        let phase = "identity";
        let players = ["You", "Bot_Olga", "Bot_Dennis", "Bot_Svetlana", "Bot_Vlad", "Bot_Maria"];
        let votes = {};
        let timeLeft = 600;
        let timerInt = null;
        let gameActive = false;

        const cards = [
            { name: "Aliaksandr, tractor driver", roots: "Born near Minsk", skill: "Fixes tractors", phrase: "Draniki for life!" },
            { name: "Harrison Ford", roots: "Grandparents from MINSK", skill: "Flies planes", phrase: "I found the Crystal Skull!" },
            { name: "Tom Cruise", roots: "NO roots!", skill: "Runs on walls", phrase: "I jumped over Minsk!" }
        ];

        function addMsg(sender, msg) {
            let chat = document.getElementById("chat");
            chat.innerHTML += `<div><b>${sender}:</b> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

        function startTimer() {
            if(timerInt) clearInterval(timerInt);
            timerInt = setInterval(() => {
                if(timeLeft <= 1) {
                    clearInterval(timerInt);
                    addMsg("SYSTEM", "Time's up!");
                    nextPhase();
                } else {
                    timeLeft--;
                    document.getElementById("timer").innerHTML = `⏱️ ${formatTime(timeLeft)}`;
                }
            }, 1000);
        }

        function startSolo() {
            gameActive = true;
            let randomCard = cards[Math.floor(Math.random() * cards.length)];
            document.getElementById("cardArea").innerHTML = `<div class="card" id="myCard"><b>${randomCard.name}</b><br>🌱 ROOTS: ${randomCard.roots}<br>🛠️ SKILL: ${randomCard.skill}<br>💬 PHRASE: "${randomCard.phrase}"</div>`;
            document.getElementById("chat").innerHTML = "";
            addMsg("SYSTEM", "Game started! Round 1: Introduce yourself!");
            startTimer();
            document.getElementById("soloPanel").style.display = "none";
            document.getElementById("multiPanel").style.display = "none";
            document.getElementById("gamePanel").style.display = "block";
            document.getElementById("voteArea").style.display = "none";
        }

        function nextPhase() {
            if(phase === "identity") {
                phase = "crisis";
                addMsg("SYSTEM", "🔥 CRISIS: Salt for lard ran out! What do you do?");
                addMsg("SYSTEM", "Type your solution in chat!");
            } else if(phase === "crisis") {
                phase = "voting";
                let btns = document.getElementById("voteBtns");
                btns.innerHTML = "";
                players.forEach(p => {
                    let btn = document.createElement("button");
                    btn.innerText = p;
                    btn.onclick = () => { votes.human = p; addMsg("You", `I vote for ${p}`); };
                    btns.appendChild(btn);
                });
                document.getElementById("voteArea").style.display = "block";
                addMsg("SYSTEM", "🗳️ VOTE: Who should be left outside?");
            }
        }

        function submitVote() {
            if(votes.human) {
                addMsg("SYSTEM", `Vote submitted! ${votes.human} is eliminated.`);
                document.getElementById("voteArea").style.display = "none";
                if(timerInt) clearInterval(timerInt);
            } else {
                addMsg("SYSTEM", "Please select someone to vote out!");
            }
        }

        document.getElementById("soloBtn").onclick = () => {
            document.getElementById("soloPanel").style.display = "block";
            document.getElementById("multiPanel").style.display = "none";
            document.getElementById("soloBtn").classList.add("active");
            document.getElementById("multiBtn").classList.remove("active");
        };
        document.getElementById("multiBtn").onclick = () => {
            document.getElementById("soloPanel").style.display = "none";
            document.getElementById("multiPanel").style.display = "block";
            document.getElementById("multiBtn").classList.add("active");
            document.getElementById("soloBtn").classList.remove("active");
        };
        document.getElementById("startGame").onclick = startSolo;
        document.getElementById("nextPhase").onclick = nextPhase;
        document.getElementById("submitVote").onclick = submitVote;
        document.getElementById("sendChat").onclick = () => {
            let inp = document.getElementById("chatInput");
            let msg = inp.value.trim();
            if(msg && gameActive) {
                addMsg("You", msg);
                inp.value = "";
            }
        };
        document.getElementById("exitGame").onclick = () => { if(confirm("Exit?")) location.reload(); };
        document.getElementById("createLobby").onclick = () => alert("Lobby created! Share link with friends.");
        document.getElementById("joinLobby").onclick = () => alert("Enter room number from Game Master.");
        document.getElementById("myCard")?.addEventListener("click", () => {
            let c = document.getElementById("myCard");
            if(c) c.classList.toggle("hidden-card");
        });
    </script>
</body>
</html>
